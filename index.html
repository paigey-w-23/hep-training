<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HEP Training">
<title>Hybrid Engine Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --teal: #1A7A6E; --teal-light: #E6F4F2; --teal-mid: #0F6E56; --teal-dark: #085041;
  --orange: #E8833A; --orange-light: #FEF3EB; --red: #A32D2D; --red-light: #FCEBEB;
  --purple: #534AB7; --purple-light: #EEEDFE; --pink: #D4537E; --pink-light: #FBEAF0;
  --green: #3B6D11; --green-light: #EAF3DE; --bg: #F5F5F3; --surface: #FFFFFF;
  --surface2: #F7F7F5; --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --text1: #1A1A1A; --text2: #5A5A5A; --text3: #999999; --radius: 10px; --radius-sm: 7px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --teal: #2A9D8F; --teal-light: #0D2E2A; --teal-mid: #3BB5A5; --orange: #F4A261;
    --orange-light: #2D1E0F; --red: #E76F6F; --red-light: #2D1010; --purple: #9B8FE8;
    --purple-light: #1A1730; --pink: #E88AB0; --pink-light: #2D1020; --green: #6AB04C;
    --green-light: #122008; --bg: #0F0F0F; --surface: #1C1C1E; --surface2: #2C2C2E;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --text1: #F2F2F7; --text2: #AEAEB2; --text3: #636366;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }
.app { max-width: 430px; margin: 0 auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-title { font-size: 16px; font-weight: 600; color: var(--text1); }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.nav { background: var(--surface); border-top: 0.5px solid var(--border); display: flex; position: sticky; bottom: 0; z-index: 100; padding-bottom: var(--safe-bottom); }
.nav-btn { flex: 1; padding: 8px 2px 10px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text3); font-size: 10px; font-family: inherit; }
.nav-btn.active { color: var(--teal); }
.content { flex: 1; padding: 12px; overflow-y: auto; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.card-hdr { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.pill { display: inline-flex; align-items: center; border-radius: 20px; padding: 3px 9px; font-size: 11px; font-weight: 600; }
.pt { background: var(--teal-light); color: var(--teal-mid); }
.po { background: var(--orange-light); color: var(--orange); }
.pr { background: var(--red-light); color: var(--red); }
.pp { background: var(--pink-light); color: var(--pink); }
.pg { background: var(--green-light); color: var(--green); }
.sec-lbl { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 6px; }
.wk-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.wk-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--text2); font-family: inherit; }
.day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 12px; }
.day-chip { padding: 6px 2px; border-radius: var(--radius-sm); text-align: center; cursor: pointer; border: 0.5px solid transparent; background: var(--surface2); }
.day-chip.active { background: var(--teal); border-color: var(--teal); }
.day-chip.active .dc-name, .day-chip.active .dc-date { color: white; }
.day-chip.haslog { border-color: var(--teal); }
.day-chip.haslog .dc-name, .day-chip.haslog .dc-date { color: var(--teal); }
.day-chip.offday { opacity: 0.35; cursor: default; }
.day-chip.camping { background: var(--green-light); border-color: var(--green); }
.day-chip.camping .dc-name, .day-chip.camping .dc-date { color: var(--green); }
.day-chip.travel { background: var(--pink-light); border-color: var(--pink); }
.day-chip.travel .dc-name, .day-chip.travel .dc-date { color: var(--pink); }
.dc-name { font-size: 11px; font-weight: 600; color: var(--text1); }
.dc-date { font-size: 9px; color: var(--text2); margin-top: 1px; }
.sess-block { border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; }
.sess-hdr { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: var(--surface2); }
.sess-title { font-size: 14px; font-weight: 600; color: var(--text1); }
.sess-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.sess-body { padding: 12px; border-top: 0.5px solid var(--border); }
.chev { font-size: 10px; color: var(--text3); display: inline-block; transition: transform 0.15s; }
.chev.open { transform: rotate(90deg); }
.ex-row { padding: 8px 0; border-bottom: 0.5px solid var(--border); }
.ex-row:last-child { border-bottom: none; }
.ex-name { font-size: 13px; font-weight: 600; color: var(--text1); }
.ex-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.ex-note { font-size: 11px; color: var(--teal); margin-top: 2px; }
.wu-step { display: flex; gap: 9px; padding: 6px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
.wu-step:last-child { border-bottom: none; }
.wu-num { width: 20px; height: 20px; border-radius: 50%; background: var(--teal-light); color: var(--teal-mid); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.wu-txt { font-size: 12px; color: var(--text1); line-height: 1.45; }
.thr-blk { background: var(--teal-light); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
.thr-title { font-size: 11px; font-weight: 700; color: var(--teal-mid); margin-bottom: 3px; }
.thr-desc { font-size: 11px; color: var(--teal-mid); line-height: 1.5; }
.plyo-blk { background: var(--purple-light); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
.plyo-title { font-size: 11px; font-weight: 700; color: var(--purple); margin-bottom: 3px; }
.plyo-desc { font-size: 11px; color: var(--purple); line-height: 1.5; }
.travel-blk { background: var(--pink-light); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 10px; }
.travel-title { font-size: 14px; font-weight: 700; color: var(--pink); margin-bottom: 4px; }
.travel-desc { font-size: 12px; color: var(--pink); line-height: 1.5; }
.set-row { display: grid; grid-template-columns: 22px 1fr 1fr 28px; gap: 5px; align-items: center; margin-bottom: 5px; }
.set-num { font-size: 11px; color: var(--text3); text-align: center; }
.set-in { width: 100%; font-size: 13px; padding: 6px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text1); font-family: inherit; text-align: center; }
.set-in:focus { outline: none; border-color: var(--teal); }
.set-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; }
.set-lbl-row { display: grid; grid-template-columns: 22px 1fr 1fr 28px; gap: 5px; margin-bottom: 4px; }
.set-lbl { font-size: 10px; color: var(--text3); text-align: center; text-transform: uppercase; letter-spacing: 0.04em; }
.hrv-row { display: flex; gap: 8px; margin-bottom: 8px; }
.hrv-btn { flex: 1; padding: 9px 4px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 600; color: var(--text2); }
.hrv-btn.hg { background: var(--green-light); border-color: var(--green); color: var(--green); }
.hrv-btn.ho { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
.hrv-btn.hr { background: var(--red-light); border-color: var(--red); color: var(--red); }
.hrv-proto { border-radius: var(--radius-sm); padding: 9px 11px; margin-bottom: 8px; font-size: 12px; line-height: 1.5; }
.hrv-proto.green { background: var(--green-light); color: var(--green); }
.hrv-proto.orange { background: var(--orange-light); color: var(--orange); }
.hrv-proto.red { background: var(--red-light); color: var(--red); }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 20px; text-align: center; cursor: pointer; margin-bottom: 8px; background: var(--surface2); }
.upload-zone:active { border-color: var(--teal); background: var(--teal-light); }
.up-preview { width: 100%; border-radius: var(--radius-sm); max-height: 180px; object-fit: cover; margin-top: 8px; }
.f-row { margin-bottom: 10px; }
.f-row label { font-size: 11px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 4px; }
.f-row input, .f-row select, .f-row textarea { width: 100%; font-size: 13px; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text1); font-family: inherit; -webkit-appearance: none; }
.f-row input:focus, .f-row textarea:focus { outline: none; border-color: var(--teal); }
.f-row textarea { min-height: 70px; resize: none; line-height: 1.5; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.p-btn { width: 100%; padding: 13px; background: var(--teal); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; }
.p-btn:active { opacity: 0.85; transform: scale(0.99); }
.s-btn { width: 100%; padding: 10px; background: none; color: var(--teal); border: 1px solid var(--teal); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 6px; font-weight: 600; }
.sum-card { border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; border: 0.5px solid var(--border); }
.sum-hdr { background: var(--teal); padding: 11px 14px; }
.sum-hdr-title { font-size: 14px; font-weight: 700; color: white; }
.sum-hdr-sub { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
.sum-body { padding: 12px; background: var(--surface); }
.flag { display: flex; gap: 9px; align-items: flex-start; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
.flag:last-child { border-bottom: none; }
.f-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.f-good { background: var(--green); }
.f-warn { background: var(--orange); }
.f-info { background: var(--teal); }
.f-lbl { font-size: 10px; font-weight: 700; color: var(--text2); margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.04em; }
.f-txt { font-size: 12px; color: var(--text1); line-height: 1.45; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.stat-lbl { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.stat-val { font-size: 22px; font-weight: 700; color: var(--text1); }
.stat-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }
.prog-wrap { background: var(--surface2); border-radius: 20px; height: 6px; margin-top: 5px; overflow: hidden; }
.prog-bar { height: 100%; background: var(--teal); border-radius: 20px; transition: width 0.4s; }
.tab-row { display: flex; margin-bottom: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
.tab-item { flex: 1; padding: 8px 3px; background: none; border: none; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; color: var(--text2); border-right: 0.5px solid var(--border); }
.tab-item:last-child { border-right: none; }
.tab-item.active { background: var(--teal); color: white; }
.hydro-track { height: 8px; background: var(--surface2); border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
.hydro-fill { height: 100%; background: var(--teal); border-radius: 20px; transition: width 0.3s; }
.flow-row { display: flex; gap: 5px; margin-bottom: 8px; }
.flow-btn { flex: 1; padding: 8px 3px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; color: var(--text2); text-align: center; }
.flow-btn.sel { background: var(--pink-light); border-color: var(--pink); color: var(--pink); }
.sym-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.sym-btn { padding: 7px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text2); text-align: center; }
.sym-btn.sel { background: var(--pink-light); border-color: var(--pink); color: var(--pink); }
.ai-think { display: flex; align-items: center; gap: 8px; padding: 11px 13px; background: var(--surface2); border-radius: var(--radius-sm); margin: 8px 0; }
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 1.2s ease-in-out infinite; }
.ai-dot:nth-child(2) { animation-delay: 0.2s; }
.ai-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
.chart-box { width: 100%; height: 140px; margin-top: 8px; }
.warning-box { background: var(--orange-light); border: 0.5px solid var(--orange); border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 12px; font-size: 12px; color: var(--orange); line-height: 1.5; }
.success-box { background: var(--green-light); border: 0.5px solid var(--green); border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 12px; font-size: 12px; color: var(--green); line-height: 1.5; font-weight: 600; }
.settings-icon { cursor: pointer; padding: 4px; color: var(--text2); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-width: 430px; margin: 0 auto; padding-bottom: calc(20px + var(--safe-bottom)); max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text1); margin-bottom: 16px; }
.modal-close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text2); }
.body-zone-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
.bz { padding: 5px 9px; border: 0.5px solid var(--border2); border-radius: 20px; font-size: 12px; cursor: pointer; color: var(--text2); }
.bz.sel { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
.key-note { font-size: 11px; color: var(--text2); margin-top: 8px; line-height: 1.6; }
.key-note a { color: var(--teal); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">Hybrid Engine Pro</div>
      <div class="topbar-sub" id="topbar-sub">Block 1 · Week 1</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="cycle-badge" class="pill pp" style="display:none"></span>
      <span id="hrv-badge" class="pill pt">HRV: –</span>
      <div class="settings-icon" onclick="openSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>
  <div class="content" id="main-content"></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('today')" id="nav-today">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Today
    </button>
    <button class="nav-btn" onclick="showTab('log')" id="nav-log">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M6 10h8M6 14h5M6 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="2" width="14" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>Log
    </button>
    <button class="nav-btn" onclick="showTab('health')" id="nav-health">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 17s-7-4.35-7-9a4 4 0 018 0 4 4 0 018 0c0 4.65-7 9-7 9z" stroke="currentColor" stroke-width="1.5"/></svg>Health
    </button>
    <button class="nav-btn" onclick="showTab('progress')" id="nav-progress">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 15l4-4 3 3 4-5 3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 5v12h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Progress
    </button>
    <button class="nav-btn" onclick="showTab('plan')" id="nav-plan">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Plan
    </button>
  </nav>
</div>

<div id="settings-modal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-title">Settings <button class="modal-close" onclick="closeSettings()">&#215;</button></div>
    <div class="card-hdr">Anthropic API Key</div>
    <div id="key-status"></div>
    <div class="f-row">
      <label>Your API key (stored locally on this device only)</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
    </div>
    <p class="key-note">Your key is saved only in this browser's local storage — it never leaves your device except to call the Anthropic API directly. Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys → Create Key.</p>
    <button class="p-btn" onclick="saveApiKey()" style="margin-top:12px">Save API key</button>
    <div style="margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border)">
      <div class="card-hdr">Plan start date</div>
      <div class="f-row"><label>Week 1 Monday</label><input type="date" id="plan-start-input" value="2026-04-06"></div>
      <button class="s-btn" onclick="savePlanStart()">Update plan start</button>
    </div>
    <div style="margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border)">
      <div class="card-hdr" style="color:var(--red)">Data</div>
      <button class="s-btn" style="border-color:var(--red);color:var(--red)" onclick="if(confirm('Clear all logged data?'))clearAllData()">Clear all logged data</button>
    </div>
  </div>
</div>

<script>
const PLAN_START_DEFAULT=new Date("2026-04-06");
const CAMPING_START=new Date("2026-06-04");
const CAMPING_END=new Date("2026-06-07");
const TRAVEL_START=new Date("2026-06-11");
const TRAVEL_END=new Date("2026-06-30");
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const SYMS=["Cramps","Bloating","Fatigue","Headache","Mood changes","Breast tenderness","Back pain","Nausea","Insomnia","Energy high"];
const FLOW_OPTS=["None","Spotting","Light","Medium","Heavy"];
const BODY_ZONES=["Neck","L shoulder","R shoulder","Upper back","Lower back","L hip","R hip","L knee","R knee","L ankle","R ankle","Achilles","Quads","Hamstrings","Calves"];
const WU={
  upper:["Band pull-aparts × 15 — retract scapula fully","Dead hang 20 sec + shoulder rolls × 10 each direction","Scapular push-ups × 10 — protract and retract at top","Arm circles × 10 each direction — full ROM","Cat-cow × 8 — focus on thoracic extension","Wrist circles × 10 each direction"],

function renderProgress(){
  const totalWks=PLAN.blocks.reduce((a,b)=>a+b.weeks.length,0);
  const doneWks=PLAN.blocks.slice(0,S.cb).reduce((a,b)=>a+b.weeks.length,0)+S.cw;
  const pct=Math.round((doneWks/totalWks)*100);
  const z2E=Object.keys(S.cadence).filter(k=>S.cadence[k]?.z2).map(k=>parseFloat(S.cadence[k].z2));
  const thE=Object.keys(S.cadence).filter(k=>S.cadence[k]?.th).map(k=>parseFloat(S.cadence[k].th));
  const lastZ2=z2E.slice(-1)[0]||"–";const lastTh=thE.slice(-1)[0]||"–";
  const sessCount=Object.keys(S.logs).filter(k=>Object.keys(S.logs[k]).length>0).length;
  const lastWeight=S.bodyLogs.slice(-1)[0]?.weight||"–";
  let h=`<div class="card"><div class="card-hdr">Plan progress</div><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;color:var(--text2)">${blk().name} · ${wk().name}</span><span style="font-size:12px;font-weight:700;color:var(--teal)">${pct}%</span></div><div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div><div style="font-size:10px;color:var(--text3);margin-top:4px">${doneWks} of ${totalWks} weeks complete</div></div>`;
  h+=`<div class="stat-grid"><div class="stat-card"><div class="stat-lbl">Sessions logged</div><div class="stat-val">${sessCount}</div></div><div class="stat-card"><div class="stat-lbl">Current weight</div><div class="stat-val">${lastWeight}</div><div class="stat-sub">lbs · goal: recomp</div></div><div class="stat-card"><div class="stat-lbl">Last Z2 cadence</div><div class="stat-val">${lastZ2}</div><div class="stat-sub">Target: 163+ spm</div></div><div class="stat-card"><div class="stat-lbl">Last threshold cad.</div><div class="stat-val">${lastTh}</div><div class="stat-sub">Target: 170+ spm</div></div></div>`;
  if(z2E.length>1)h+=`<div class="card"><div class="card-hdr">Zone 2 cadence trend</div><div class="chart-box"><canvas id="cad-chart"></canvas></div><div style="font-size:10px;color:var(--text3);margin-top:4px">Dashed line = 163 spm Block 1 target</div></div>`;
  if(S.bodyLogs.length>1)h+=`<div class="card"><div class="card-hdr">Weight trend</div><div class="chart-box"><canvas id="weight-chart"></canvas></div></div>`;
  const warnFlags=[];Object.keys(S.summaries).forEach(k=>{const s=S.summaries[k];if(s?.flags)s.flags.filter(f=>f.type==="warn").forEach(f=>warnFlags.push({date:s.date,text:f.text}));});
  if(warnFlags.length>0){h+=`<div class="sec-lbl">Recent flags requiring attention</div>`;warnFlags.slice(-5).reverse().forEach(f=>{h+=`<div class="card" style="padding:10px 12px;margin-bottom:6px;border-left:2px solid var(--orange);border-radius:0 var(--radius-sm) var(--radius-sm) 0"><div style="font-size:10px;font-weight:700;color:var(--text2);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em">${f.date}</div><div style="font-size:12px;color:var(--text1);line-height:1.45">${f.text}</div></div>`;});}
  else h+=`<div style="text-align:center;padding:28px 20px;color:var(--text2);font-size:13px">No flags yet — log sessions to see trends here.</div>`;
  document.getElementById("main-content").innerHTML=h;
  if(z2E.length>1)drawCadChart(z2E);
  if(S.bodyLogs.length>1)drawWeightChart("weight-chart");
}

function renderPlan(){
  let h=`<div class="wk-nav"><button class="wk-btn" onclick="prevWeek()">&#8592;</button><div style="text-align:center"><div style="font-size:15px;font-weight:700;color:var(--text1)">${blk().name} · ${wk().name}</div><div style="font-size:11px;color:var(--text2)">${wk().sub}</div></div><button class="wk-btn" onclick="nextWeek()">&#8594;</button></div>`;
  PLAN.blocks.forEach((block,bi)=>{
    h+=`<div class="sec-lbl">${block.name} — ${block.sub}</div>`;
    block.weeks.forEach((week,wi)=>{
      const wsd=getWSD(bi,wi);const wend=new Date(wsd);wend.setDate(wend.getDate()+6);
      const isCurr=bi===S.cb&&wi===S.cw;
      const hasCamp=wsd<=CAMPING_END&&wend>=CAMPING_START;
      const hasTrav=wsd<=TRAVEL_END&&wend>=TRAVEL_START;
      h+=`<div class="card" style="margin-bottom:6px;${isCurr?"border-color:var(--teal);border-width:1.5px;":""}cursor:pointer" onclick="jumpTo(${bi},${wi})"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:700;color:${isCurr?"var(--teal)":"var(--text1)"}">${week.name}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${week.sub}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${fmtDate(wsd)} – ${fmtDate(wend)}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">${isCurr?`<span class="pill pt">Current</span>`:`<span style="font-size:12px;color:var(--text3)">&#9654;</span>`}${hasCamp?`<span class="pill pg">Camping</span>`:""}${hasTrav?`<span class="pill pp">Travel</span>`:""}</div></div></div>`;
    });
  });
  document.getElementById("main-content").innerHTML=h;
}

function renderSum(sum){
  let h=`<div class="sum-card"><div class="sum-hdr"><div class="sum-hdr-title">AI session summary</div><div class="sum-hdr-sub">${sum.date}</div></div><div class="sum-body">`;
  (sum.flags||[]).forEach(f=>{h+=`<div class="flag"><div class="f-dot f-${f.type}"></div><div><div class="f-lbl">${f.label}</div><div class="f-txt">${f.text}</div></div></div>`;});

function render(){
  if(S.tab==="today")renderToday();
  else if(S.tab==="log")renderLog();

function saveBodyLog(){if(!S.body.date&&!S.body.weight)return;S.bodyLogs.push({...S.body});saveState();render();}
function handleUpload(e,key){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{S.uploadedImgs[key]=ev.target.result;saveState();render();};reader.readAsDataURL(file);}
function showThinking(msg){const mc=document.getElementById("main-content");const el=document.createElement("div");el.id="ai-thinking";el.className="ai-think";el.innerHTML=`<div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="font-size:13px;color:var(--text2)">${msg}</span>`;mc.appendChild(el);}
function hideThinking(){const el=document.getElementById("ai-thinking");if(el)el.remove();}

async function aiCall(prompt,imgBase64,mimeType){
  const apiKey=getApiKey();
  if(!apiKey)throw new Error("No API key. Open the gear icon ⚙ in the top right to add your Anthropic API key.");
  const content=imgBase64?[{type:"image",source:{type:"base64",media_type:mimeType,data:imgBase64}},{type:"text",text:prompt}]:[{type:"text",text:prompt}];
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-5",max_tokens:1000,messages:[{role:"user",content}]})});
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||"API error "+resp.status);}
  const data=await resp.json();
  const text=data.content?.map(c=>c.text||"").join("").trim();
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function genSummary(){
  const k=dkey(),dd=dayData();const items=[];
  const sessions=dd.sessions||(dd.type==="travel_train"?[TRAVEL_STR]:[]);
  sessions.forEach(sess=>{if(!sess.exercises)return;sess.exercises.forEach((ex,ei)=>{const sets=[];for(let si=0;si<ex.s;si++){const w=getLog(sess.id,ei,si,'w'),r=getLog(sess.id,ei,si,'r');if(w||r)sets.push(`set ${si+1}: ${w||"?"}lbs×${r||"?"} reps`);}if(sets.length)items.push(`${ex.n}: ${sets.join(", ")} (prescribed: ${ex.s}×${ex.r})`);});const fb=getFb(sess.id);if(fb)items.push(`Notes: ${fb}`);});
  const ck=S.cadence[k];if(ck?.z2)items.push(`Z2 cadence: ${ck.z2} spm (target 163+)`);if(ck?.th)items.push(`Threshold cadence: ${ck.th} spm (target 170+)`);
  if(S.logs[k]?.dayNote)items.push(`Day notes: ${S.logs[k].dayNote}`);if(S.tightness.length)items.push(`Tightness: ${S.tightness.join(", ")}`);
  const isTrav=wk().istravel;
  const prompt=`Exercise physiologist reviewing session for 36yo female athlete. 168 lbs, 72.5 lbs lean muscle mass. Regular menstrual cycle day ${S.cycle.day||"unknown"}. Current block: ${isTrav?"TRAVEL MAINTENANCE":blk().name+" "+wk().name}. Day: ${S.selDay} (${fmtDateFull(selDate())}). HRV: ${S.hrv||"not logged"}. Recovery: ${S.recovery}/5. Hydration: ${S.nutrition.water}oz. ${isTrav?"Focus flags on: protein adequacy for muscle preservation, aerobic maintenance, recovery quality.":""}Session data: ${items.join("; ")||"minimal data logged"}. Generate 3–5 specific, actionable flags. Respond ONLY with a JSON array: [{"type":"good|warn|info","label":"2-4 words","text":"1-2 specific sentences"}]. No markdown, no explanation, just the JSON array.`;
  showThinking("Analyzing your session...");
  try{const flags=await aiCall(prompt,null,null);S.summaries[k]={date:`${isTrav?"Travel":blk().name+" "+wk().name} · ${S.selDay} ${fmtDate(selDate())}`,flags};saveState();}
  catch(e){alert(e.message||"AI analysis failed.");}
  hideThinking();render();
}

async function genWeeklyReview(){
  const z2Last=Object.values(S.cadence).filter(c=>c?.z2).slice(-1)[0]?.z2||"not logged";
  const lastWt=S.bodyLogs.slice(-1)[0]?.weight||"not logged";
  const warnTexts=[];Object.keys(S.summaries).forEach(k=>{const s=S.summaries[k];if(s?.flags)s.flags.filter(f=>f.type==="warn").forEach(f=>warnTexts.push(f.text));});
  const prompt=`Exercise physiologist generating weekly review for 36yo female athlete, 168 lbs, 72.5 lbs lean muscle mass, regular cycle. ${blk().name} ${wk().name} (${wk().sub}). ${wk().istravel?"TRAVEL MAINTENANCE BLOCK — focus on LMM preservation status, aerobic base maintenance, return-to-training readiness.":""}HRV trend: ${S.hrv||"not logged"}. Recovery avg: ${S.recovery}/5. Z2 cadence last: ${z2Last} spm (target 163+). Weight: ${lastWt} lbs. Cycle day: ${S.cycle.day||"unknown"}, symptoms: ${S.cycle.symptoms.join(",")||"none"}. Tightness: ${S.tightness.join(",")||"none"}. Sessions this week: ${Object.keys(S.logs).filter(k=>k.startsWith(wkey())).length}. Hydration: ${S.nutrition.water}oz. Flags: ${warnTexts.join("; ")||"none"}. Generate 4–6 flags: what went well, what needs attention, cadence progress, recovery quality, next week cycle phase implications, one priority coaching recommendation. Respond ONLY with JSON array: [{"type":"good|warn|info","label":"2-4 words","text":"specific actionable insight"}]. No markdown, just JSON.`;
  showThinking("Generating your weekly review...");
  try{const flags=await aiCall(prompt,null,null);S.summaries[wkey()+"-weekly"]={date:`Weekly review · ${blk().name} ${wk().name}`,flags};saveState();}
  catch(e){alert(e.message||"Weekly review failed.");}
  hideThinking();render();
}

function copyWeeklySummary(){
  const wr=S.summaries[wkey()+"-weekly"];
  const z2Last=Object.values(S.cadence).filter(c=>c?.z2).slice(-1)[0]?.z2||"not logged";
  const lastWt=S.bodyLogs.slice(-1)[0]?.weight||"not logged";
  const flagText=wr?.flags?.map(f=>`[${f.type.toUpperCase()}] ${f.label}: ${f.text}`).join("\n")||"No flags";
  const msg=`WEEKLY TRAINING DATA — ${blk().name} ${wk().name}\n\nHRV: ${S.hrv||"not logged"}\nRecovery score: ${S.recovery}/5\nZ2 cadence: ${z2Last} spm (target 163+)\nWeight: ${lastWt} lbs\nCycle day: ${S.cycle.day||"not logged"}, symptoms: ${S.cycle.symptoms.join(", ")||"none"}\nTightness: ${S.tightness.join(", ")||"none"}\nSessions logged: ${Object.keys(S.logs).filter(k=>k.startsWith(wkey())).length}\nHydration: ${S.nutrition.water} oz\n\nAI weekly review flags:\n${flagText}\n\nPlease: (1) review this week's data, (2) tell me what to adjust for next week, (3) flag anything requiring attention, (4) confirm whether to progress load or hold.`;
  if(navigator.clipboard){navigator.clipboard.writeText(msg).then(()=>alert("Weekly summary copied! Paste it into your Claude conversation.")).catch(()=>{const ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copied! Paste into Claude.");});}
  else{const ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copied! Paste into Claude.");}
}
